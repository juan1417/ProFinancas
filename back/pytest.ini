[pytest]
DJANGO_SETTINGS_MODULE = ProFinanzas.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --nomigrations
    --reuse-db

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
